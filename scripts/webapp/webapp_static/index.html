<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>切片对照浏览器</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f7f7f5; color: #222; }
  #layout { display: flex; height: 100vh; }
  #sidebar { width: 320px; flex-shrink: 0; border-right: 1px solid #ddd; overflow-y: auto; background: #fff; padding: 10px; }
  #main { flex: 1; overflow-y: auto; padding: 20px 30px; }
  .tree-node { user-select: none; }
  .tree-dir { cursor: pointer; padding: 3px 4px; font-size: 13px; font-weight: 600; color: #555; display: flex; align-items: center; gap: 4px; }
  .tree-dir:hover { background: #f0f0ee; border-radius: 4px; }
  .tree-file { cursor: pointer; padding: 3px 4px 3px 18px; font-size: 13px; color: #333; border-radius: 4px; }
  .tree-file:hover { background: #eef4ff; }
  .tree-file.active { background: #dbe8ff; font-weight: 600; }
  .tree-children { margin-left: 14px; border-left: 1px dashed #ddd; padding-left: 4px; }
  .tree-children.collapsed { display: none; }
  .caret { display: inline-block; width: 10px; transition: transform 0.1s; }
  .caret.open { transform: rotate(90deg); }

  #topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  #doc-title { font-size: 16px; font-weight: 600; }
  #doc-sub { font-size: 12px; color: #888; margin-top: 2px; }
  .tabs { display: flex; gap: 6px; }
  .tab-btn { padding: 6px 14px; font-size: 13px; border: 1px solid #ccc; background: #fff; border-radius: 6px; cursor: pointer; }
  .tab-btn.active { background: #222; color: #fff; border-color: #222; }
  .stat { font-size: 12px; padding: 3px 9px; border-radius: 5px; background: #eee; color: #555; margin-right: 6px; }
  .stat.gap { background: #fbe4e4; color: #a33; }

  .pair-card { border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
  .pair-head { display: flex; justify-content: space-between; align-items: center; padding: 7px 14px; background: #f5f5f2; font-size: 12.5px; gap: 8px; flex-wrap: wrap; }
  .pair-head .section { font-weight: 600; }
  .pair-meta { color: #888; font-family: ui-monospace, monospace; font-size: 11px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 5px; background: #e6f1fb; color: #0c447c; }
  .pair-body { display: grid; grid-template-columns: 1fr 1fr; }
  .pair-col { padding: 10px 14px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
  .pair-col:first-child { border-right: 1px solid #eee; color: #555; }
  .col-label { font-size: 10.5px; color: #999; text-transform: uppercase; margin: 0 0 4px; letter-spacing: 0.03em; }

  .suspect-card { border: 1px solid #d9b95c; border-radius: 10px; margin-bottom: 10px; overflow: hidden; background: #fffbea; }
  .suspect-head { display: flex; justify-content: space-between; padding: 7px 14px; background: #fdf3d0; font-size: 12.5px; font-weight: 600; color: #8a6d1a; gap: 8px; flex-wrap: wrap; }
  .suspect-body { display: grid; grid-template-columns: 1fr 1fr; }
  .suspect-body .pair-col:first-child { border-right: 1px solid #f0e4b8; }

  .gap-card { border: 1px solid #e0a0a0; border-radius: 10px; margin-bottom: 10px; overflow: hidden; background: #fff7f7; }
  .gap-head { display: flex; justify-content: space-between; padding: 7px 14px; background: #fbe4e4; font-size: 12.5px; font-weight: 600; color: #a33; gap: 8px; flex-wrap: wrap; }
  .gap-body { padding: 10px 14px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }

  .stat.suspect { background: #fdf3d0; color: #8a6d1a; }

  #raw-view { font-family: ui-monospace, "SF Mono", monospace; font-size: 12.5px; background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; word-break: break-word; }

  #doc-render { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 24px 32px; font-size: 14.5px; line-height: 1.75; color: #222; max-width: 760px; }
  #doc-render h1 { font-size: 22px; margin: 0 0 16px; }
  #doc-render h2 { font-size: 18px; margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 1px solid #eee; }
  #doc-render h3 { font-size: 15.5px; margin: 20px 0 8px; }
  #doc-render h4 { font-size: 14px; margin: 16px 0 6px; color: #444; }
  #doc-render p { margin: 0 0 12px; }
  #doc-render ul, #doc-render ol { margin: 0 0 12px; padding-left: 22px; }
  #doc-render li { margin-bottom: 4px; }
  #doc-render code { font-family: ui-monospace, monospace; font-size: 12.5px; background: #f2f2f0; padding: 1px 5px; border-radius: 4px; }
  #doc-render pre { background: #1e1e1e; color: #d4d4d4; padding: 12px 14px; border-radius: 8px; overflow-x: auto; }
  #doc-render pre code { background: none; padding: 0; color: inherit; }
  #doc-render table { border-collapse: collapse; width: 100%; margin: 0 0 16px; font-size: 13px; }
  #doc-render th, #doc-render td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
  #doc-render th { background: #f5f5f2; }
  #doc-render a { color: #185fa5; }
  #doc-render img { max-width: 100%; }
  #doc-render blockquote { margin: 0 0 12px; padding: 4px 14px; border-left: 3px solid #ddd; color: #666; }
  .json-key { color: #9cdcfe; }
  .json-string { color: #ce9178; }
  .json-number { color: #b5cea8; }
  .json-bool { color: #569cd6; }
  .md-heading { color: #4ec9b0; font-weight: 600; }
  .md-bullet { color: #dcdcaa; }
  .md-bold { color: #ce9178; }
  .md-code { color: #9cdcfe; }

  #empty, #loading, #error { color: #999; font-size: 14px; padding: 40px 0; text-align: center; }
  #error { color: #a33; }
</style>
</head>
<body>
<div id="layout">
  <div id="sidebar"><div id="tree">加载中…</div></div>
  <div id="main">
    <div id="empty">从左边选一篇文档</div>
  </div>
</div>

<script>
let currentPath = null;
let currentView = "diff";

async function loadTree() {
  const res = await fetch("/api/tree");
  const trees = await res.json();
  const container = document.getElementById("tree");
  container.innerHTML = "";
  trees.forEach(t => container.appendChild(renderNode(t, true)));
}

function renderNode(node, isRoot) {
  const wrap = document.createElement("div");
  wrap.className = "tree-node";
  if (node.type === "dir") {
    const row = document.createElement("div");
    row.className = "tree-dir";
    const caret = document.createElement("span");
    caret.className = "caret" + (isRoot ? " open" : "");
    caret.textContent = "›";
    row.appendChild(caret);
    row.appendChild(document.createTextNode(node.name));
    wrap.appendChild(row);

    const childWrap = document.createElement("div");
    childWrap.className = "tree-children" + (isRoot ? "" : " collapsed");
    node.children.forEach(c => childWrap.appendChild(renderNode(c, false)));
    wrap.appendChild(childWrap);

    row.onclick = () => {
      childWrap.classList.toggle("collapsed");
      caret.classList.toggle("open");
    };
  } else {
    const row = document.createElement("div");
    row.className = "tree-file";
    row.textContent = node.name.replace(/\.md$/, "");
    row.dataset.path = node.path;
    row.onclick = () => selectFile(node.path, row);
    wrap.appendChild(row);
  }
  return wrap;
}

function selectFile(path, rowEl) {
  document.querySelectorAll(".tree-file.active").forEach(el => el.classList.remove("active"));
  rowEl.classList.add("active");
  currentPath = path;
  render();
}

async function render() {
  const main = document.getElementById("main");
  main.innerHTML = '<div id="loading">加载中…</div>';
  if (currentView === "diff") {
    await renderDiff();
  } else if (currentView === "raw") {
    await renderRaw();
  } else {
    await renderSource();
  }
}

async function renderDiff() {
  const res = await fetch(`/api/diff?path=${encodeURIComponent(currentPath)}`);
  const data = await res.json();
  const main = document.getElementById("main");
  if (data.error) {
    main.innerHTML = `<div id="error">${escapeHtml(data.error)}</div>`;
    return;
  }
  let html = topbarHtml(data.doc, `${data.chunk_count} 个chunk`, data.matched_count, data.gap_count, false, data.suspect_count);
  data.pairs.forEach(p => {
    html += `<div class="pair-card">
      <div class="pair-head">
        <span class="section">${escapeHtml(p.heading)}</span>
        <span style="display:flex;gap:6px;align-items:center;">
          ${p.doc_type ? `<span class="badge">${escapeHtml(p.doc_type)}</span>` : ""}
          ${p.applicable_carrier ? `<span class="badge">${escapeHtml(p.applicable_carrier)}</span>` : ""}
          <span class="pair-meta">${escapeHtml(p.chunk_id)} · 精确匹配</span>
        </span>
      </div>
      <div class="pair-body">
        <div class="pair-col"><p class="col-label">原文</p>${escapeHtml(p.src_text)}</div>
        <div class="pair-col"><p class="col-label">切片结果</p>${escapeHtml(p.chunk_text)}</div>
      </div>
    </div>`;
  });
  data.suspects.forEach(s => {
    html += `<div class="suspect-card">
      <div class="suspect-head">
        <span class="section">${escapeHtml(s.heading)}</span>
        <span>◐ 疑似改写/需复核 — ${escapeHtml(s.chunk_id)} · 相似度 ${s.ratio}</span>
      </div>
      <div class="suspect-body">
        <div class="pair-col"><p class="col-label">原文</p>${escapeHtml(s.src_text)}</div>
        <div class="pair-col"><p class="col-label">最相似的切片结果</p>${escapeHtml(s.chunk_text)}</div>
      </div>
    </div>`;
  });
  data.gaps.forEach(g => {
    html += `<div class="gap-card">
      <div class="gap-head"><span>${escapeHtml(g.heading)}</span><span>⚠ 未覆盖（最佳相似度 ${g.ratio}）</span></div>
      <div class="gap-body">${escapeHtml(g.src_text)}</div>
    </div>`;
  });
  main.innerHTML = html;
  bindTabs();
}

async function renderRaw() {
  const res = await fetch(`/api/raw?path=${encodeURIComponent(currentPath)}`);
  const data = await res.json();
  const main = document.getElementById("main");
  if (data.error) {
    main.innerHTML = `<div id="error">${escapeHtml(data.error)}</div>`;
    return;
  }
  let html = topbarHtml(data.doc, `chunks 文件: ${escapeHtml(data.chunks_file)}`, data.chunks.length, 0, true);
  if (data.parent) {
    html += `<p class="col-label" style="margin:0 0 6px;">PARENT 记录</p><div id="raw-view">${jsonHighlight(JSON.stringify(data.parent, null, 2))}</div><div style="height:16px;"></div>`;
  }
  html += `<p class="col-label" style="margin:0 0 6px;">CHILD 记录（${data.chunks.length}）</p>`;
  html += `<div id="raw-view">${jsonHighlight(JSON.stringify(data.chunks, null, 2))}</div>`;
  main.innerHTML = html;
  bindTabs();
}

async function renderSource() {
  const res = await fetch(`/api/source?path=${encodeURIComponent(currentPath)}`);
  const data = await res.json();
  const main = document.getElementById("main");
  if (data.error) {
    main.innerHTML = `<div id="error">${escapeHtml(data.error)}</div>`;
    return;
  }
  let html = topbarHtml(data.doc, `${data.line_count} 行`, null, null, true);
  html += `<div id="doc-render">${data.html}</div>`;
  main.innerHTML = html;
  bindTabs();
}

function topbarHtml(doc, subLabel, matched, gaps, noGapStat, suspects) {
  return `<div id="topbar">
    <div>
      <div id="doc-title">${escapeHtml(doc.split("/").pop())}</div>
      <div id="doc-sub">${escapeHtml(doc)}</div>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <div>
        <span class="stat">${escapeHtml(subLabel)}</span>
        ${matched === null ? "" : `<span class="stat">精确匹配 ${matched}</span>`}
        ${!suspects ? "" : `<span class="stat suspect">疑似改写 ${suspects}</span>`}
        ${noGapStat ? "" : `<span class="stat gap">未覆盖 ${gaps}</span>`}
      </div>
      <div class="tabs">
        <button class="tab-btn" data-view="diff">对照视图</button>
        <button class="tab-btn" data-view="raw">原始 JSONL</button>
        <button class="tab-btn" data-view="source">完整原文</button>
      </div>
    </div>
  </div>`;
}

function bindTabs() {
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.view === currentView);
    btn.onclick = () => {
      currentView = btn.dataset.view;
      render();
    };
  });
}

function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function jsonHighlight(json) {
  const escaped = escapeHtml(json);
  return escaped.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
    let cls = "json-number";
    if (/^"/.test(match)) {
      cls = /:$/.test(match) ? "json-key" : "json-string";
    } else if (/true|false/.test(match)) {
      cls = "json-bool";
    }
    return `<span class="${cls}">${match}</span>`;
  });
}

function markdownHighlight(md) {
  const escaped = escapeHtml(md);
  const lines = escaped.split("\n").map(line => {
    if (/^#{1,6}\s/.test(line)) return `<span class="md-heading">${line}</span>`;
    if (/^\s*[-*]\s/.test(line)) return `<span class="md-bullet">${line}</span>`;
    return line
      .replace(/(\*\*[^*]+\*\*)/g, '<span class="md-bold">$1</span>')
      .replace(/(`[^`]+`)/g, '<span class="md-code">$1</span>');
  });
  return lines.join("\n");
}

loadTree();
</script>
</body>
</html>
