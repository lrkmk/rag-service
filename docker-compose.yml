services:
  atlas-docs-mcp:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # chroma_db is built offline (python scripts/ingest_chroma.py &&
      # python scripts/ingest_api_docs.py) and mounted read-only here — the
      # service never writes to it, and re-ingesting updated docs on the
      # host doesn't require rebuilding or restarting this container's image,
      # only a restart to pick up the new data (Chroma's PersistentClient
      # reads from disk on each query, no in-memory cache to invalidate).
      - ./chroma_db:/app/chroma_db:ro
    restart: unless-stopped
