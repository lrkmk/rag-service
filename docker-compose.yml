services:
  atlas-docs-mcp:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # chroma_db is built offline (python scripts/ingest/ingest_help_center.py &&
      # python scripts/ingest/ingest_api_docs.py) and mounted here so re-ingesting
      # updated docs on the host doesn't require rebuilding this container's
      # image, only a restart to pick up the new data (Chroma's
      # PersistentClient reads from disk on each query, no in-memory cache
      # to invalidate).
      #
      # NOT mounted :ro — that was tried and breaks even pure queries: Chroma
      # is backed by SQLite, which needs write access to the *directory*
      # (WAL/journal/lock files) regardless of whether the workload is
      # read-only. A read-only mount produced "attempt to write a readonly
      # database" on the very first query against the deployed service.
      - ./chroma_db:/app/chroma_db
      # parents_lookup.json is regenerated by ingest_help_center.py alongside
      # chroma_db and needs the same update path: `git pull` + restart, no
      # rebuild. It used to be COPY'd into the image (see Dockerfile), which
      # meant `docker compose restart` after a `git pull` kept serving a
      # stale snapshot — a child pointing at a newly-added parent_id resolved
      # to null parent_title/parent_summary/source_path until a full
      # `docker compose up --build`. This file IS git-tracked (unlike
      # chroma_db, which is gitignored and shipped via GitHub Release), so a
      # plain `git pull` on the server is enough to update the host copy this
      # mounts from. Safe to mount :ro — it's a plain JSON `open()` read, not
      # SQLite, so it doesn't need directory write access like chroma_db does.
      - ./scripts/ingest/parents_lookup.json:/app/scripts/ingest/parents_lookup.json:ro
    restart: unless-stopped
